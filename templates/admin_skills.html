<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f1f5f9; color: #334155; }
        .container { max-width: 800px; margin: 0 auto; }
        .form-section { background: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #e2e8f0; }
        input, textarea, select { width: 100%; padding: 0.5rem; margin: 0.5rem 0; border: 1px solid #cbd5e1; border-radius: 4px; }
        button { background: #4f46e5; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .item { display: flex; justify-content: space-between; padding: 0.5rem; border-bottom: 1px solid #e2e8f0; }
        .del-btn { background: #ef4444; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/">← Back to Site</a>
        <h1>Admin Dashboard</h1>

        <div class="form-section">
            <h2>Add Skill</h2>
            <form action="/admin/add/skill" method="POST">
                <input type="text" name="name" placeholder="Skill Name" required>
                <input type="text" name="level" placeholder="Level (e.g. Expert)">
                <input type="number" name="fill" placeholder="Percentage (0-100)" required>
                <button type="submit">Add Skill</button>
            </form>
            <div style="margin-top: 1rem;">
                {% for s in skills %}
                <div class="item">{{ s.name }} <form action="/admin/delete/skill/{{s.id}}" method="POST"><button class="del-btn">Delete</button></form></div>
                {% endfor %}
            </div>
        </div>

        <div class="form-section">
            <h2>Add Project</h2>
            <form action="/admin/add/project" method="POST">
                <input type="text" name="name" placeholder="Project Title" required>
                <textarea name="desc" placeholder="Description"></textarea>
                <input type="text" name="tech" placeholder="Tech (comma separated)">
                <input type="text" name="link" placeholder="Link">
                <button type="submit">Add Project</button>
            </form>
            <div style="margin-top: 1rem;">
                {% for p in projects %}
                <div class="item">{{ p.name }} <form action="/admin/delete/project/{{p.id}}" method="POST"><button class="del-btn">Delete</button></form></div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
